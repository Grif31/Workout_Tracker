name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src
    env:
      # Dummy value, never a real secret — app.py's module-level `app =
      # create_app()` (needed for `gunicorn app:app` in railway.json) runs
      # unconditionally on import and fails fast if JWT_SECRET_KEY is unset
      # or still the 'dev-secret-key' default. Locally this is masked by
      # .env (gitignored, never reaches CI); this just satisfies that same
      # check here — the test suite itself uses its own JWT_SECRET_KEY via
      # conftest.py's test_config, not this one.
      JWT_SECRET_KEY: ci-dummy-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: src/requirements.txt

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/ -q

  frontend:
    name: Frontend tests & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/workout-tracker-native
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/workout-tracker-native/package-lock.json

      - run: npm ci

      - name: Jest
        run: npx jest --maxWorkers=2

      - name: Type check
        if: ${{ !cancelled() }}
        run: npx tsc --noEmit -p .
